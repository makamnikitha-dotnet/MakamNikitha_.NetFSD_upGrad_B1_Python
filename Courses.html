<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - E-Learning</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Theme Overrides -->
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Bootstrap Navbar -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
            <div class="container">
                <a class="navbar-brand text-primary fw-bold" href="Dashboard.html">E-Learning</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link fw-medium" href="Dashboard.html">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link active fw-medium" href="Courses.html">Courses</a></li>
                        <li class="nav-item"><a class="nav-link fw-medium" href="Quiz.html">Quiz</a></li>
                        <li class="nav-item"><a class="nav-link fw-medium" href="Profile.html">Profile</a></li>
                    </ul>
                    <form class="ms-lg-3 mt-3 mt-lg-0 d-flex" id="nav-search-form">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-magnifying-glass text-secondary"></i></span>
                            <input class="form-control border-start-0 ps-0" type="search" placeholder="Search courses..." aria-label="Search" id="nav-search-input">
                        </div>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-4 flex-grow-1">
        <!-- Bootstrap Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#" class="text-decoration-none text-secondary">Home</a></li>
                <li class="breadcrumb-item active text-primary fw-medium" aria-current="page">Courses</li>
            </ol>
        </nav>

        <section class="mb-5 fade-in-up delay-1">
            <h1 class="h2 fw-bold mb-4">Available Courses</h1>
            
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col" class="py-3 px-4 text-uppercase text-secondary fs-sm fw-semibold" style="width: 15%;">Course ID</th>
                                    <th scope="col" class="py-3 px-4 text-uppercase text-secondary fs-sm fw-semibold" style="width: 20%;">Category</th>
                                    <th scope="col" class="py-3 px-4 text-uppercase text-secondary fs-sm fw-semibold">Details</th>
                                </tr>
                            </thead>
                            <tbody id="courses-table-body">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Global Toast Container -->
    <div aria-live="polite" aria-atomic="true" class="position-relative">
        <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastPlacement">
            <!-- Toasts will be injected dynamically via JS -->
        </div>
    </div>

    <!-- Bootstrap Footer -->
    <footer class="footer-theme text-white text-center py-4 mt-auto">
        <p class="mb-0 small opacity-75">&copy; 2026 E-Learning Platform. Professional Courses Edition.</p>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
